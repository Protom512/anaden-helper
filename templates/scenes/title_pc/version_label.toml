# PC版(Windows 16:9) title コールドスタート用 小テンプレ (Task #5 / T3 / 親 Issue #5)。
# pc-scoped 名前空間(scenes/title_pc/)。実機20:9 (templates/scenes/title/ 配下の
# title_center.png 800x300 / load_game_area.png 600x150 等の大型テンプレ) は
# 背景差・点滅アニメーションに弱く TASKS.md:30-33 既知ブロッカー。本テンプレは
# その解決策: 点滅("Tap to Start" 正規化(930,488)) に巻き込まれない固定テクスチャ
# (右下 version/copyright 表示帯) を小テンプレ化して安定検出する。
#
# 座標系: **RAW 1258x708 ピクセル空間**(PC版 GetClientRect 実測, ScreenScaler RAW 通過)。
#
# ⚠ 幾何学的ギャップ(解決済判定: affine bridge 不可 → 暫定値保持, Issue #13 T1):
# 当初のコメントは「20:9 norm(1280x576) 右下帯 y=545..572 の run x=1077..1189 を
# PC 16:9 (1258x708) へ scale+offset で写像」と主張していた。これは幾何学的に不成立:
#   - norm(1280x576) は Pixel7a(20:9) を BASE_WIDTH=1280 基準で正規化した 20:9 フレーム。
#   - PC RAW(1258x708) は 16:9 クライアント領域。アスペクト比 1.777 ≠ 20:9 の 2.222。
#   - 縦横で縮尺が異なるため scale+offset のアフィン変換では 1280x576 → 1258x708 へ
#     写像できない(異方性・非アフィンなコンテンツ配置が必要)。docs/pc-capture-dimensions.md §2。
#   - さらに再実行(2026-06-23)で右下帯 y=545..572 に x=1077..1189 の run は検出されず、
#     右端の run は x=985..1029 w=44 のみ。よって暫定値は再導出で裏付けられなかった。
# 上記より affine bridge を厳密に文書化できないため、Issue #13 の承認条件に従い
# 暫定 ROI は【値そのままで保持】し、20:9 自己クロップ暫定マーカ扱いを継続する。
# (値の更新には実測 PC プローブによる幾何学的裏付けが必須 = Issue #12 Branch A)
#
# ⚠ 未解決リスク: templates/captures/title_pc_probe.png (PC 実機 title フレーム) が未整備。
# 現 PNG は 20:9 キャプチャからの自己クロップで比例配置した暫定マーカ(20:9 self-crop provisional)。
# pipeline.rs の probe E2E テスト(pc_title_pc_templates_match_real_capture_above_threshold) は
# プローブ不在時スキップし、実機プローブ整備後に閾値以上マッチで再検証する(absence-skip)。
# 実機プローブ(title_pc_probe.png)到着時に README step 3-5 で実測 conf を取り本 ROI/テンプレを再調整。
# ↓ 実測値へ更新 (operator probe 2026-07-07, PC RAW 1258x708 space)。
#   バージョン表示「ver 3.15.60 (985)」は実機では【右上】(旧暫定 [1046,668,112,28]=右下 は
#   20:9 自己クロップ由来で不正確)。テンプレ version_label.png も 1258x708 空間へ再生成済み。
roi       = [712, 8, 121, 35]
threshold = 0.80
