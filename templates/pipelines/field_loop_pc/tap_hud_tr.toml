name      = "TapHudTrPc"
state     = "Field"
algorithm = "ccoeff"
template  = "hud_tr.png"
# PC版(Windows 16:9)フィールドループ slice (T5)。pc-scoped 名前空間(field_loop_pc/)。
# 実機20:9 (templates/pipelines/field_loop/tap_hud_tr.toml) を上書きしない。
#
# 座標系: **RAW 1258x708 ピクセル空間**(PC版 GetClientRect 実測)。
# ScreenScaler は width<=1280 で RAW 通過のため、1280基準ではなく RAW 1258 空間で記述。
# 20:9 版(ROI=[1080,150,180,150] は1280基準)の流用はアスペクト比差で劣化(実績: conf 0.99→0.67)。
#
# ROI: フィールド画面 右上HUD要素。field_pc_probe.png 上で FieldPcHudTopRight が
# conf=1.0 @ [1056,0,202,100] にマッチする領域を包含する RAW 1258 空間 ROI。
roi       = [1038, 0, 218, 120]
threshold = 0.80
# click_self: 認識したHUD要素(matched_region 中心)を SendInput でタップ。
# 効果は発火前後キャプチャのシーン変化で誠実判定(T6 pre/post scene diff)。
action    = { type = "click_self" }
next      = []
